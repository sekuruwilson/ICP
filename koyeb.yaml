# Koyeb Service Definition
name: icp-app
services:
  - name: icp-backend
    type: WEB
    source:
      git:
        repository: github.com/sekuruwilson/ICP
        branch: master
        workdir: backend
        builder: DOCKER
    instance_type: nano
    regions:
      - fra # or 'was' for US
    ports:
      - port: 8000
        protocol: http
    routes:
      - path: /
        port: 8000
    env:
      - key: PORT
        value: "8000"
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.11.0"
      # These will be set in the Koyeb UI for security:
      # - DATABASE_URL
      # - SECRET_KEY
      # - CORS_ALLOWED_ORIGINS
      # - CSRF_TRUSTED_ORIGINS
