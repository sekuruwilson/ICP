version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=icp
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/icp
      - REDIS_URL=redis://redis:6379
      - DEBUG=True
      - SECRET_KEY=local_secret_key
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile # Assuming you have one, or use npm run dev
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api/
    depends_on:
      - backend
